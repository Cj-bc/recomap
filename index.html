<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
  <title>配信スポットマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="public/leaflet-map.js"></script>
  <script src="elm.js"></script>
  <script>
    const app = Elm.Main.init({ node: document.getElementById('app') });

    app.ports.requestLocation.subscribe(() => {
      if (!navigator.geolocation) {
        app.ports.receiveLocationRaw.send(null);
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => app.ports.receiveLocationRaw.send({
          lat: pos.coords.latitude, lng: pos.coords.longitude,
        }),
        () => app.ports.receiveLocationRaw.send(null),
        { enableHighAccuracy: false, timeout: 8000, maximumAge: 60000 }
      );
    });
    
    app.ports.saveFavoritesRaw.subscribe((ids) => {
      try { localStorage.setItem('favoritePosters', JSON.stringify(ids)); }
      catch (e) { console.warn(e); }
    });
    
    try {
      const stored = JSON.parse(localStorage.getItem('favoritePosters') || '[]');
      if (Array.isArray(stored) && stored.length > 0) {
        queueMicrotask(() => app.ports.loadFavoritesRaw.send(stored));
      }
    } catch (e) { console.warn(e); }
  </script>
</body>
</html>>
